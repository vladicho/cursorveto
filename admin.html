<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoldeLab - Painel Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell admin-shell">
      <section class="auth-card">
        <div class="brand">
          <span class="brand-mark">M</span>
          <div>
            <h1>Painel Admin</h1>
            <p>Acesso restrito ao administrador</p>
          </div>
        </div>

        <!-- Formulário de login admin (visível quando não autenticado) -->
        <form id="adminLoginForm" class="auth-form">
          <label>
            Email
            <input id="adminEmail" type="email" autocomplete="username" required />
          </label>
          <label>
            Senha
            <input id="adminPassword" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Entrar como admin</button>
        </form>

        <!-- Conteúdo do painel (visível após login admin) -->
        <div id="adminPanel" hidden>
          <div class="admin-actions">
            <a class="admin-link" href="/">Abrir editor</a>
            <a class="admin-link" href="/login.html">Voltar ao login</a>
            <button id="refreshUsers" type="button">Atualizar lista</button>
          </div>

          <h2 class="admin-section-title">Aguardando aprovacao</h2>
          <div id="pendingUsers" class="admin-user-list"></div>

          <h2 class="admin-section-title">Todos os usuarios</h2>
          <div id="allUsers" class="admin-user-list"></div>
        </div>

        <p id="adminMessage" class="auth-message" hidden></p>
      </section>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
