<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoldeLab - Aprovar usuarios</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell admin-shell">
      <section class="auth-card">
        <div class="brand">
          <span class="brand-mark">M</span>
          <div>
            <h1>Aprovar usuarios</h1>
            <p>Painel do administrador</p>
          </div>
        </div>

        <div class="admin-actions">
          <a class="admin-link" href="/">Abrir editor</a>
          <a class="admin-link" href="/login.html">Voltar ao login</a>
          <button id="refreshUsers" type="button">Atualizar lista</button>
        </div>

        <h2 class="admin-section-title">Aguardando aprovacao</h2>
        <div id="pendingUsers" class="admin-user-list"></div>

        <h2 class="admin-section-title">Todos os usuarios</h2>
        <div id="allUsers" class="admin-user-list"></div>

        <p id="adminMessage" class="auth-message" hidden></p>
      </section>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
